# hoaphong.site — cùng pattern nesting.click / bodyexporter.com
# sudo cp deploy/nginx-hoaphong-site.conf /etc/nginx/sites-available/hoaphong.site
# sudo ln -sf /etc/nginx/sites-available/hoaphong.site /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
# Sau khi DNS trỏ IP: sudo certbot --nginx -d hoaphong.site -d www.hoaphong.site

server {
    listen 80;
    listen [::]:80;
    server_name hoaphong.site www.hoaphong.site;

    client_max_body_size 32M;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Subdomain công ty — redirect về apex + ?tenant= (ERP_USE_TENANT_QUERY=1, chưa cần wildcard SSL)
# Sau khi có cert *.hoaphong.site: proxy trực tiếp thay vì redirect
server {
    listen 80;
    listen [::]:80;
    server_name ~^(?<tenant>[^.]+)\.hoaphong\.site$;

    return 301 https://hoaphong.site$uri?tenant=$tenant;
}
