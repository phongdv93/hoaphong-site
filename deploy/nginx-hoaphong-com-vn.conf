# hoaphong.com.vn — thêm song song hoaphong.site (cùng app port 3002)
# sudo cp deploy/nginx-hoaphong-com-vn.conf /etc/nginx/sites-available/hoaphong.com.vn
# sudo ln -sf /etc/nginx/sites-available/hoaphong.com.vn /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
#
# Sau khi DNS A → 23.142.84.59 có hiệu lực:
# sudo certbot --nginx -d hoaphong.com.vn -d www.hoaphong.com.vn
# (tuỳ chọn wildcard sau: certbot dns challenge cho *.hoaphong.com.vn)

# HTTP — certbot + redirect sau khi có SSL
server {
    listen 80;
    listen [::]:80;
    server_name hoaphong.com.vn www.hoaphong.com.vn;

    client_max_body_size 32M;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Subdomain công ty (MST hoặc slug) — chưa có wildcard SSL: redirect apex + ?tenant=
# Sau khi có cert *.hoaphong.com.vn: đổi thành proxy_pass (giữ Host subdomain)
server {
    listen 80;
    listen [::]:80;
    server_name ~^(?<tenant>[^.]+)\.hoaphong\.com\.vn$;

    return 301 https://hoaphong.com.vn/erp/login?tenant=$tenant;
}

