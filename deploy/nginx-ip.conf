# Nginx — deploy bằng IP VPS (chưa có tên miền) — VPS TRỐNG, chưa có web nào
# Nếu VPS đã có web khác → dùng deploy/nginx-ip-coexist.conf (cổng 8080)
# Copy: sudo cp deploy/nginx-ip.conf /etc/nginx/sites-available/hoaphong
#       sudo ln -sf /etc/nginx/sites-available/hoaphong /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 32M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
