# Nginx — Hoa Phong chạy CÙNG VPS đã có web khác (không đụng cổng 80)
# Copy: sudo cp deploy/nginx-ip-coexist.conf /etc/nginx/sites-available/hoaphong
#       sudo ln -sf /etc/nginx/sites-available/hoaphong /etc/nginx/sites-enabled/hoaphong
#       sudo nginx -t && sudo systemctl reload nginx
#
# App nội bộ: 127.0.0.1:3002  →  public: http://IP:8080

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    client_max_body_size 32M;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
